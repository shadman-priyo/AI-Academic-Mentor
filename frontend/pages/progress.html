<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Progress — AI Academic Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css"/>
  <style>
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .prog-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .chart-wrap { background:var(--bg-2); border-radius:var(--radius-sm); padding:16px; overflow:hidden; }
    .bar-chart { display:flex; align-items:flex-end; gap:8px; height:160px; padding-top:8px; }
    .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
    .bar { width:100%; border-radius:6px 6px 0 0; transition:height 0.8s cubic-bezier(0.4,0,0.2,1); min-height:4px; cursor:default; position:relative; }
    .bar:hover::after { content:attr(data-val); position:absolute; top:-24px; left:50%; transform:translateX(-50%); font-size:0.7rem; color:var(--text); background:var(--surface); padding:2px 6px; border-radius:4px; white-space:nowrap; font-family:var(--mono); }
    .bar-label { font-size:0.65rem; color:var(--text-3); text-align:center; font-family:var(--mono); }
    .topic-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
    .topic-row:last-child { border-bottom:none; }
    .topic-name { flex:1; font-size:0.88rem; font-weight:500; color:var(--text); }
    .topic-score { font-family:var(--mono); font-size:0.82rem; font-weight:700; min-width:40px; text-align:right; }
    .topic-prog-wrap { width:120px; }
    .quiz-table-wrap { overflow-x:auto; }
    .no-data { text-align:center; padding:40px; color:var(--text-3); font-size:0.85rem; }
    .radar-wrap { display:flex; justify-content:center; padding:10px; }
    @media(max-width:800px) { .stats-row{grid-template-columns:1fr 1fr} .prog-grid{grid-template-columns:1fr} }
    @media(max-width:480px) { .stats-row{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <header class="topbar">
      <div>
        <div class="topbar-title">📊 Progress Analytics</div>
        <div class="topbar-sub">Track your performance and identify weak areas</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" onclick="clearAllData()" style="font-size:0.8rem;color:var(--text-3);">Reset Data</button>
      </div>
    </header>
    <div class="page-body wide" style="padding:28px;max-width:1100px;">

      <div class="stats-row stagger" id="statsRow"></div>

      <div class="prog-grid">
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Quiz Scores Over Time</div>
          <div class="chart-wrap">
            <div class="bar-chart" id="scoreChart"></div>
          </div>
          <div style="font-size:0.72rem;color:var(--text-3);margin-top:8px;font-family:var(--mono);">Last 10 quizzes</div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Topic Performance</div>
          <div id="topicBreakdown"></div>
        </div>
      </div>

      <div class="prog-grid">
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">AI Feature Usage</div>
          <div id="featureUsage"></div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Weekly Activity</div>
          <div class="chart-wrap">
            <div class="bar-chart" id="weeklyChart"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">Quiz History</div>
        <div class="quiz-table-wrap">
          <table class="data-table" id="quizTable">
            <thead>
              <tr><th>Topic</th><th>Score</th><th>Questions</th><th>Correct</th><th>Date</th><th>Grade</th></tr>
            </thead>
            <tbody id="quizTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script type="module">
Auth.require();
renderSidebar('progress');

// FIX: this page used to render purely from localStorage, which could be
// empty/stale on a new device or after clearing the browser. We now pull
// the real quiz history from MongoDB via /api/quiz and merge it into the
// local cache before anything below renders, so the numbers you see here
// actually reflect what's stored in the database.
try {
  const backendQuizzes = await BackendAPI.listQuizResults();
  if (backendQuizzes?.results?.length) {
    const mapped = backendQuizzes.results.map(r => ({
      topic: r.topic, score: r.score, numQ: r.numQuestions, correct: r.correct, date: r.createdAt
    }));
    DataStore.set('quiz_results', mapped);
  }
} catch (err) {
  console.warn('Could not load live quiz history from backend, using local cache:', err.message);
}

const quizzes = DataStore.get('quiz_results') || [];
const chats = DataStore.get('chat_history') || [];
const plans = DataStore.get('study_plans') || [];
const summaries = DataStore.get('summaries') || [];

// Stats
const totalQ = quizzes.length;
const avgScore = totalQ ? Math.round(quizzes.reduce((a,q) => a+(q.score||0), 0)/totalQ) : 0;
const bestScore = totalQ ? Math.max(...quizzes.map(q=>q.score||0)) : 0;
const streak = calcStreak();

function calcStreak() {
  if (!quizzes.length) return 0;
  const days = new Set(quizzes.map(q => new Date(q.date).toDateString()));
  let streak = 0;
  let d = new Date();
  while (days.has(d.toDateString())) { streak++; d.setDate(d.getDate()-1); }
  return streak;
}

document.getElementById('statsRow').innerHTML = `
  <div class="stat-card fade-up"><div class="stat-icon">⚡</div><div class="stat-number">${totalQ}</div><div class="stat-label">Total Quizzes</div></div>
  <div class="stat-card fade-up"><div class="stat-icon">🎯</div><div class="stat-number">${avgScore}%</div><div class="stat-label">Average Score</div><div class="stat-change">${avgScore>=70?'✓ Strong performance':avgScore>0?'Keep practicing':'No data yet'}</div></div>
  <div class="stat-card fade-up"><div class="stat-icon">🏆</div><div class="stat-number">${bestScore}%</div><div class="stat-label">Best Score</div></div>
  <div class="stat-card fade-up"><div class="stat-icon">🔥</div><div class="stat-number">${streak}</div><div class="stat-label">Day Streak</div><div class="stat-change">${streak>0?'Keep it up!':'Study today!'}</div></div>
`;

// Bar chart — last 10 quiz scores
function renderScoreChart() {
  const el = document.getElementById('scoreChart');
  const data = [...quizzes].reverse().slice(0,10);
  if (!data.length) { el.parentElement.innerHTML = '<div class="no-data">Take quizzes to see your score trend</div>'; return; }
  el.innerHTML = data.map((q,i) => {
    const h = Math.max(8, q.score * 1.5);
    const col = q.score>=70?'var(--accent)':q.score>=50?'var(--gold)':'var(--accent-2)';
    return `
      <div class="bar-col">
        <div class="bar" style="height:${h}px;background:${col};" data-val="${q.score}%"></div>
        <span class="bar-label">Q${i+1}</span>
      </div>
    `;
  }).join('');
}

// Topic breakdown
function renderTopicBreakdown() {
  const el = document.getElementById('topicBreakdown');
  if (!quizzes.length) { el.innerHTML = '<div class="no-data">No quiz data yet</div>'; return; }
  const topics = {};
  quizzes.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = { scores:[], count:0 };
    topics[q.topic].scores.push(q.score||0);
    topics[q.topic].count++;
  });
  const sorted = Object.entries(topics).map(([t,d]) => ({
    topic: t,
    avg: Math.round(d.scores.reduce((a,b)=>a+b,0)/d.scores.length),
    count: d.count
  })).sort((a,b)=>b.avg-a.avg);

  el.innerHTML = sorted.slice(0,8).map(t => `
    <div class="topic-row">
      <div class="topic-name">${escapeHtml(t.topic.length>30?t.topic.slice(0,30)+'...':t.topic)}</div>
      <div class="topic-prog-wrap">
        <div class="prog-bar"><div class="prog-fill ${t.avg>=70?'green':t.avg>=50?'gold':'blue'}" style="width:${t.avg}%"></div></div>
      </div>
      <div class="topic-score" style="color:${t.avg>=70?'var(--accent)':t.avg>=50?'var(--gold)':'var(--accent-2)'}">${t.avg}%</div>
    </div>
  `).join('');
}

// Feature usage
function renderFeatureUsage() {
  const el = document.getElementById('featureUsage');
  const features = [
    { name:'AI Chatbot', icon:'🤖', count:chats.length, color:'var(--primary)' },
    { name:'Quiz Generator', icon:'⚡', count:quizzes.length, color:'var(--gold)' },
    { name:'Note Summarizer', icon:'📝', count:summaries.length, color:'var(--accent)' },
    { name:'Study Planner', icon:'📅', count:plans.length, color:'var(--accent-2)' },
  ];
  const maxCount = Math.max(...features.map(f=>f.count), 1);
  el.innerHTML = features.map(f => `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <span style="font-size:1.1rem;width:24px;">${f.icon}</span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <span style="font-size:0.82rem;color:var(--text);">${f.name}</span>
          <span style="font-family:var(--mono);font-size:0.78rem;color:var(--text-3);">${f.count} uses</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(f.count/maxCount*100)}%;background:${f.color};"></div></div>
      </div>
    </div>
  `).join('');
}

// Weekly activity
function renderWeeklyChart() {
  const el = document.getElementById('weeklyChart');
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const counts = new Array(7).fill(0);
  const allActivity = [
    ...quizzes.map(q=>new Date(q.date)),
    ...chats.map(c=>new Date(c.date)),
    ...summaries.map(s=>new Date(s.date)),
  ];
  allActivity.forEach(d => {
    const dow = (d.getDay() + 6) % 7; // Mon=0
    counts[dow]++;
  });
  const max = Math.max(...counts, 1);
  el.innerHTML = days.map((d,i) => {
    const h = Math.max(4, counts[i]/max * 140);
    return `
      <div class="bar-col">
        <div class="bar" style="height:${h}px;background:var(--primary);opacity:${counts[i]?1:0.2};" data-val="${counts[i]} actions"></div>
        <span class="bar-label">${d}</span>
      </div>
    `;
  }).join('');
}

// Quiz table
function renderQuizTable() {
  const body = document.getElementById('quizTableBody');
  if (!quizzes.length) {
    body.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:30px;">No quiz data yet. Generate a quiz to track progress!</td></tr>`;
    return;
  }
  body.innerHTML = [...quizzes].reverse().map(q => {
    const grade = q.score>=90?'A+':q.score>=80?'A':q.score>=70?'B':q.score>=60?'C':q.score>=50?'D':'F';
    const gradeColor = q.score>=70?'var(--accent)':q.score>=50?'var(--gold)':'var(--accent-2)';
    return `
      <tr>
        <td>${escapeHtml(q.topic)}</td>
        <td style="color:${gradeColor};font-weight:700;">${q.score}%</td>
        <td>${q.numQ}</td>
        <td>${q.correct || Math.round((q.score/100)*q.numQ)}</td>
        <td style="color:var(--text-3);">${new Date(q.date).toLocaleDateString()}</td>
        <td><span class="badge ${q.score>=70?'badge-green':q.score>=50?'badge-gold':'badge-blue'}">${grade}</span></td>
      </tr>
    `;
  }).join('');
}

function clearAllData() {
  if (!confirm('Clear ALL your progress data? This cannot be undone.')) return;
  ['quiz_results','chat_history','study_plans','summaries','chat_sessions','notifications'].forEach(k => DataStore.set(k, []));
  location.reload();
}
window.clearAllData = clearAllData; // module scope isn't global scope — the onclick="" in the HTML needs this

renderScoreChart();
renderTopicBreakdown();
renderFeatureUsage();
renderWeeklyChart();
renderQuizTable();
</script>
</body>
</html>
