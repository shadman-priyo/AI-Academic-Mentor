<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AI Academic Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css"/>
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; overflow:hidden; }
    .auth-bg { position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(59,130,246,0.12),transparent), radial-gradient(ellipse 60% 60% at 80% 70%,rgba(6,214,160,0.08),transparent); }
    .auth-card { position:relative; z-index:1; width:100%; max-width:440px; background:var(--surface); border:1px solid var(--border-2); border-radius:var(--radius-lg); padding:40px; box-shadow:var(--shadow-lg); animation:fadeUp 0.5s ease both; }
    .auth-card.admin-mode { border-color:rgba(245,158,11,0.35); box-shadow:var(--shadow-lg),0 0 40px rgba(245,158,11,0.08); }
    .auth-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); font-size:1.1rem; margin-bottom:28px; }
    .auth-logo strong { font-weight:800; }
    .auth-title { font-size:1.7rem; font-weight:800; color:var(--text); margin-bottom:6px; }
    .auth-sub { font-size:0.875rem; color:var(--text-2); margin-bottom:28px; }
    .auth-form { display:flex; flex-direction:column; gap:16px; }
    .auth-footer { margin-top:22px; text-align:center; font-size:0.85rem; color:var(--text-3); }
    .auth-footer a { color:var(--primary-light); text-decoration:none; font-weight:600; }
    .auth-footer a:hover { text-decoration:underline; }
    .admin-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3); color:#f0c060; border-radius:999px; padding:4px 12px; font-size:0.75rem; font-weight:700; letter-spacing:0.05em; margin-bottom:18px; }
  </style>
</head>
<body>
<div class="auth-bg"></div>
<div class="auth-page">
  <div class="auth-card" id="authCard">
    <a href="../../index.html" class="auth-logo">
      <span class="logo-icon">⬡</span>
      <span>AI<strong>Mentor</strong></span>
    </a>

    <div id="adminBadge" style="display:none;">
      <div class="admin-badge">🛡 Admin Login</div>
    </div>

    <h1 class="auth-title" id="loginTitle">Welcome back</h1>
    <p class="auth-sub" id="loginSub">Sign in to your student account</p>

    <div id="alertBox"></div>

    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@nubtk.edu" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;justify-content:center;margin-top:4px;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free →</a>
    </div>
    <div class="auth-footer" style="margin-top:6px;">
      <a href="../../index.html">← Back to home</a>
    </div>
    <div class="auth-footer" style="margin-top:6px;" id="switchLoginLink">
      <a href="login.html" id="switchLink">Sign in as Student instead →</a>
    </div>
  </div>
</div>

<script src="../components/auth.js"></script>
<script>
// FIX: demo accounts used to be faked into localStorage here on every page
// load (UserDB.add). That's gone — real demo accounts now live in MongoDB
// and are created by running `npm run seed` on the backend (see
// database/seed.js, updated to include admin@nubtk.edu / student@nubtk.edu).

// ── Detect admin mode via ?role=admin param ──────────────────────────────
const isAdminMode = new URLSearchParams(window.location.search).get('role') === 'admin';

if (isAdminMode) {
  document.getElementById('authCard').classList.add('admin-mode');
  document.getElementById('adminBadge').style.display = 'block';
  document.getElementById('loginTitle').textContent = 'Admin Access';
  document.getElementById('loginSub').textContent = 'Sign in with your administrator credentials';
  document.getElementById('switchLink').textContent = '← Sign in as Student instead';
  document.getElementById('switchLink').href = 'login.html';
} else {
  document.getElementById('switchLoginLink').innerHTML =
    '<a href="login.html?role=admin">🛡 Admin? Login here →</a>';
}

// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

// ── UI helpers ───────────────────────────────────────────────────────────
function showAlert(msg, type = 'error') {
  document.getElementById('alertBox').innerHTML =
    `<div class="alert alert-${type}" style="margin-bottom:16px;">${escapeHtml(msg)}</div>`;
}

// ── Login handler ────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const btn      = document.getElementById('loginBtn');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  document.getElementById('alertBox').innerHTML = '';

  try {
    const data = await Auth.login(email, password);
    const user = data.user;

    if (!user.isActive) {
      showAlert('Your account has been suspended. Contact your administrator.');
      Auth.logout();
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      return;
    }

    if (isAdminMode && user.role !== 'admin') {
      showAlert('This login is for administrators only. Use the regular Sign In instead.');
      Auth.logout();
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      return;
    }

    Notifications.add('Welcome back, ' + user.name + '! 👋', 'success');
    if (data.demoMode) {
      showAlert('Signed in, but the backend is NOT connected to MongoDB right now (demo mode).', 'warning');
      await new Promise(r => setTimeout(r, 1500));
    }
    window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
  } catch (err) {
    showAlert(err.message || 'Invalid email or password. Please try again.');
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}
</script>
</body>
</html>
