<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AI Academic Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css"/>
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden; }
    .auth-bg { position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 40%,rgba(59,130,246,0.12),transparent),radial-gradient(ellipse 60% 60% at 20% 70%,rgba(6,214,160,0.08),transparent); }
    .auth-card { position:relative;z-index:1;width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-lg);animation:fadeUp 0.5s ease both; }
    .auth-logo { display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-size:1.1rem;margin-bottom:28px; }
    .auth-logo strong { font-weight:800; }
    .auth-title { font-size:1.7rem;font-weight:800;color:var(--text);margin-bottom:6px; }
    .auth-sub { font-size:0.875rem;color:var(--text-2);margin-bottom:28px; }
    .auth-form { display:flex;flex-direction:column;gap:16px; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .auth-footer { margin-top:22px;text-align:center;font-size:0.85rem;color:var(--text-3); }
    .auth-footer a { color:var(--primary-light);text-decoration:none;font-weight:600; }
    .auth-footer a:hover { text-decoration:underline; }
    .admin-code-toggle { display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-3);cursor:pointer;user-select:none;margin-top:-4px; }
    .admin-code-toggle input[type=checkbox] { accent-color:var(--primary); }
    #adminCodeGroup { display:none; }
    #adminCodeGroup.show { display:block; }
    .admin-code-hint { font-size:0.75rem;color:var(--text-3);margin-top:4px;font-style:italic; }
  </style>
</head>
<body>
<div class="auth-bg"></div>
<div class="auth-page">
  <div class="auth-card">
    <a href="../../index.html" class="auth-logo">
      <span class="logo-icon">⬡</span>
      <span>AI<strong>Mentor</strong></span>
    </a>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join AI Academic Mentor — it's free</p>

    <div id="alertBox"></div>

    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Your full name" required minlength="3"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@nubtk.edu" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="studentId" class="form-input" placeholder="1123012XXXX"/>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="dept" class="form-input">
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="BBA">BBA</option>
            <option value="English">English</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm" class="form-input" placeholder="Repeat password" required/>
      </div>

      <!-- Admin registration (hidden by default) -->
      <label class="admin-code-toggle">
        <input type="checkbox" id="isAdminCheck" onchange="toggleAdminCode(this)"/>
        Registering as Administrator
      </label>
      <div class="form-group" id="adminCodeGroup">
        <label>Admin Access Code</label>
        <input type="password" id="adminCode" class="form-input" placeholder="Enter admin access code"/>
        <div class="admin-code-hint">Required to create an admin account. Contact your supervisor for this code.</div>
      </div>

      <button type="submit" class="btn-primary" id="regBtn" style="width:100%;justify-content:center;margin-top:4px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
    <div class="auth-footer" style="margin-top:6px;">
      <a href="../../index.html">← Back to home</a>
    </div>
  </div>
</div>

<script src="../components/auth.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

// FIX: registration now goes through the real backend (/api/auth/register).
// The admin access code is validated SERVER-SIDE (routes/auth.js) — the
// client-side check below is just for a fast UX error message; the backend
// re-checks it and will reject the request either way if it's wrong.

function toggleAdminCode(chk) {
  document.getElementById('adminCodeGroup').classList.toggle('show', chk.checked);
  if (!chk.checked) document.getElementById('adminCode').value = '';
}

function showAlert(msg, type = 'error') {
  document.getElementById('alertBox').innerHTML =
    `<div class="alert alert-${type}" style="margin-bottom:16px;">${escapeHtml(msg)}</div>`;
}

async function handleRegister(e) {
  e.preventDefault();
  const btn       = document.getElementById('regBtn');
  const name      = document.getElementById('name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const studentId = document.getElementById('studentId').value.trim();
  const dept      = document.getElementById('dept').value;
  const password  = document.getElementById('password').value;
  const confirm   = document.getElementById('confirm').value;
  const wantsAdmin= document.getElementById('isAdminCheck').checked;
  const adminCode = document.getElementById('adminCode').value.trim();

  if (password !== confirm) { showAlert('Passwords do not match.'); return; }
  if (password.length < 6)  { showAlert('Password must be at least 6 characters.'); return; }
  if (wantsAdmin && !adminCode) { showAlert('Enter the admin access code to create an admin account.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account…';

  try {
    const data = await Auth.register({
      name, email, password, studentId, department: dept,
      role: wantsAdmin ? 'admin' : 'student',
      adminAccessCode: wantsAdmin ? adminCode : undefined
    });

    Notifications.add('Account created! Welcome to AI Academic Mentor 🎉', 'success');
    if (data.demoMode) {
      showAlert('Account created, but the backend is NOT connected to MongoDB right now — this account will be lost on server restart. Ask your backend teammate to check the server logs.', 'warning');
      await new Promise(r => setTimeout(r, 2500));
    }
    window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
  } catch (err) {
    showAlert(err.message || 'Registration failed. Is the backend server running?');
    btn.disabled = false;
    btn.innerHTML = 'Create Account';
  }
}
</script>
</body>
</html>
